theme: E25DX

enableGitInfo: true
enableRobotsTXT: true

publishDir: docs
baseURL: https://dumindu.github.io/nu_1

defaultContentLanguage: en

languages:
  en:
    weight: 1
    languageName: English
    languageCode: en-US
    contentDir: content/en
    title: NU_1
    params:
      description: A Creative Corner for New Ideas and Innovations

# To omit the Google Analytics script, put a ~ in place of the G-XXXXXXXXXX below.
services:
  googleAnalytics:
    ID: ~

markup:
  highlight:
    noClasses: false
  goldmark:
    renderer:
      unsafe: true
    parser:
      attribute:
        block: true
        title: true

params:
  project:
    # To omit the startYear, put a ~ in its place.
    startYear: 2025
    presentYear: 2026
    github:
      repo: dumindu/nu_1
    themeColor:
      light: '#ffffff'
      dark: '#101010'

  author:
    name: Dumindu Madunuwan
    url: https://github.com/dumindu

  home:
    heading: Nu_1
    headingSegment2: ~
    description: A Creative Corner for Ideas, Thoughts and Innovations 🧑‍💻
    getStartedPath: welcome/

  pagination:
    size: 6

menus:
  main:
    - identifier: home
      name: Home
      pre: <i aria-hidden> 🏡 </i>
      pageRef: /
      weight: 10
    - identifier: blog
      name: Blog
      pre: <i aria-hidden> ✍️ </i>
      pageRef: /blog
      weight: 20
    - identifier: welcome
      name: Welcome
      pre: <i aria-hidden> 🧑‍💻 </i>
      pageRef: /page/welcome
      weight: 30
